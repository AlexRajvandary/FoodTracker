services:
  postgres:
    image: postgres:16-alpine
    container_name: foodtracker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: FoodTracker
    ports:
      - "5432:5432"
    volumes:
      - foodtracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FoodTracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: FoodTracker.Web/Dockerfile
    container_name: foodtracker-web
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSql: "Host=postgres;Port=5432;Database=FoodTracker;Username=postgres;Password=postgres"
    ports:
      - "8080:8080"

volumes:
  foodtracker_postgres_data:
